<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技术日知录 - 售前工程师知识助手</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-card-hover: #242442;
      --accent-network: #00d4ff;
      --accent-cloud: #4ecdc4;
      --accent-deploy: #ffe66d;
      --accent-bigdata: #ff6b6b;
      --accent-ai: #a855f7;
      --text-primary: #e8e8e8;
      --text-secondary: #888;
      --border-radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(78, 205, 196, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 48px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo-section h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-network), var(--accent-ai));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-section p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .date-display {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .remaining-count {
      font-size: 0.85rem;
      color: var(--accent-cloud);
      padding: 8px 16px;
      background: rgba(78, 205, 196, 0.1);
      border-radius: 20px;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent-network), var(--accent-cloud));
      border: none;
      border-radius: 30px;
      color: var(--bg-primary);
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
    }

    .refresh-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.5s ease;
    }

    .refresh-btn:hover svg {
      transform: rotate(180deg);
    }

    .domain-filter {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .domain-tag {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0.5;
      border: 1px solid transparent;
    }

    .domain-tag.active {
      opacity: 1;
      border-color: currentColor;
    }

    .domain-tag[data-domain="network"] { color: var(--accent-network); }
    .domain-tag[data-domain="cloud"] { color: var(--accent-cloud); }
    .domain-tag[data-domain="deployment"] { color: var(--accent-deploy); }
    .domain-tag[data-domain="bigdata"] { color: var(--accent-bigdata); }
    .domain-tag[data-domain="ai"] { color: var(--accent-ai); }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--border-radius);
      padding: 28px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--card-accent);
    }

    .card:hover {
      transform: translateY(-8px);
      background: var(--bg-card-hover);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px var(--card-accent-glow);
    }

    .card[data-domain="network"] {
      --card-accent: var(--accent-network);
      --card-accent-glow: rgba(0, 212, 255, 0.2);
    }
    .card[data-domain="cloud"] {
      --card-accent: var(--accent-cloud);
      --card-accent-glow: rgba(78, 205, 196, 0.2);
    }
    .card[data-domain="deployment"] {
      --card-accent: var(--accent-deploy);
      --card-accent-glow: rgba(255, 230, 109, 0.2);
    }
    .card[data-domain="bigdata"] {
      --card-accent: var(--accent-bigdata);
      --card-accent-glow: rgba(255, 107, 107, 0.2);
    }
    .card[data-domain="ai"] {
      --card-accent: var(--accent-ai);
      --card-accent-glow: rgba(168, 85, 247, 0.2);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .domain-badge {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 12px;
      background: var(--card-accent);
      color: var(--bg-primary);
    }

    .card-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .card h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .card-analogy {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .card-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keyword {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      color: var(--text-secondary);
    }

    .expand-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--card-accent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover .expand-hint {
      opacity: 1;
    }

    .connection-section {
      background: var(--bg-card);
      border-radius: var(--border-radius);
      padding: 32px;
      margin-bottom: 32px;
    }

    .connection-section h2 {
      font-size: 1.2rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .connection-chain {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .chain-item {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .chain-item:hover {
      transform: scale(1.05);
    }

    .chain-item[data-domain="network"] { background: rgba(0, 212, 255, 0.15); color: var(--accent-network); }
    .chain-item[data-domain="cloud"] { background: rgba(78, 205, 196, 0.15); color: var(--accent-cloud); }
    .chain-item[data-domain="deployment"] { background: rgba(255, 230, 109, 0.15); color: var(--accent-deploy); }
    .chain-item[data-domain="bigdata"] { background: rgba(255, 107, 107, 0.15); color: var(--accent-bigdata); }
    .chain-item[data-domain="ai"] { background: rgba(168, 85, 247, 0.15); color: var(--accent-ai); }

    .chain-arrow {
      color: var(--text-secondary);
      font-size: 1.2rem;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      padding: 20px;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-card);
      border-radius: var(--border-radius);
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .modal-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--modal-accent);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .modal-body {
      padding: 24px;
    }

    .modal-section {
      margin-bottom: 24px;
    }

    .modal-section:last-child {
      margin-bottom: 0;
    }

    .modal-section h4 {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal-section p {
      line-height: 1.8;
      color: var(--text-primary);
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-card);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--bg-card-hover);
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px 16px;
      }

      header {
        flex-direction: column;
        text-align: center;
      }

      .header-right {
        width: 100%;
        justify-content: center;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }

      .connection-chain {
        flex-direction: column;
      }

      .chain-arrow {
        transform: rotate(90deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-section">
        <h1>技术日知录</h1>
        <p>售前工程师的技术知识助手</p>
      </div>
      <div class="header-right">
        <div class="date-display" id="dateDisplay"></div>
        <div class="remaining-count" id="remainingCount">今日剩余: 66 条</div>
        <button class="refresh-btn" onclick="refreshCards()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          换一批
        </button>
      </div>
    </header>

    <div class="domain-filter">
      <span class="domain-tag active" data-domain="all" onclick="filterDomain('all')">全部</span>
      <span class="domain-tag" data-domain="network" onclick="filterDomain('network')">计算机网络</span>
      <span class="domain-tag" data-domain="cloud" onclick="filterDomain('cloud')">云计算</span>
      <span class="domain-tag" data-domain="deployment" onclick="filterDomain('deployment')">部署</span>
      <span class="domain-tag" data-domain="bigdata" onclick="filterDomain('bigdata')">大数据</span>
      <span class="domain-tag" data-domain="ai" onclick="filterDomain('ai')">AI</span>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>

    <div class="connection-section">
      <h2>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        今日知识链条
      </h2>
      <div class="connection-chain" id="connectionChain"></div>
    </div>

    <footer>
      <p>每天学习一点点，让技术沟通更简单</p>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal"></div>
  </div>

  <script>
    const knowledgeBase = [
      {
        id: 1,
        domain: "network",
        domainName: "计算机网络",
        title: `TCP/IP协议：网络世界的"普通话"`,
        analogy: `就像两个人打电话，TCP相当于确认"喂，你听到了吗？我要说话了"，IP则是告诉电话网络要把声音传到哪个号码。两者配合才能完成一次完整的通话。`,
        core: `TCP是传输控制协议，确保数据可靠传输；IP是互联网协议，负责给每台设备分配地址。TCP三次握手建立连接，四次挥手断开连接。`,
        connection: `所有网络应用的基础。无论是云计算、大数据还是AI，都依赖TCP/IP协议进行数据传输。`,
        keywords: ["TCP", "IP", "协议", "三次握手", "数据传输"]
      },
      {
        id: 2,
        domain: "network",
        domainName: "计算机网络",
        title: `DNS：互联网的"电话簿"`,
        analogy: `就像手机通讯录，你记得"百度"两个字，但手机实际拨打的是一串号码。DNS就是把这个名字翻译成数字地址的服务。`,
        core: `DNS将域名解析为IP地址，采用分层缓存机制。从本地DNS到根服务器逐级查询，返回最快的结果。`,
        connection: `DNS是云计算服务访问的入口。用户访问云端应用时，首先通过DNS找到云服务器的地址。`,
        keywords: ["DNS", "域名解析", "IP地址", "CDN", "缓存"]
      },
      {
        id: 3,
        domain: "network",
        domainName: "计算机网络",
        title: `负载均衡：交通枢纽的"红绿灯"`,
        analogy: `想象一个大型商场的多个入口，负载均衡就像智能指挥系统，把顾客均匀分配到各个入口，避免有的入口排队很长，有的却很空。`,
        core: `负载均衡将请求分配到多个服务器，提高可用性和响应速度。常见算法有轮询、最少连接、IP哈希等。`,
        connection: `云计算的核心组件。云服务商会提供负载均衡器，将流量分发到多台虚拟机，保证服务稳定。`,
        keywords: ["负载均衡", "Nginx", "高可用", "轮询", "流量分发"]
      },
      {
        id: 4,
        domain: "network",
        domainName: "计算机网络",
        title: `VPN：数据"加密隧道"`,
        analogy: `就像寄一封重要信件，普通邮件可能被偷看或篡改；而VPN相当于把这封信放进一个只有收件人能打开的保险箱里邮寄。`,
        core: `VPN通过加密技术在公共网络上建立私密通道。常见类型包括IPSec、SSL VPN、TLS等。`,
        connection: `企业接入云计算的桥梁。通过VPN，员工可以在任何地方安全地访问公司部署在云端的资源。`,
        keywords: ["VPN", "加密", "隧道", "IPSec", "远程访问"]
      },
      {
        id: 5,
        domain: "network",
        domainName: "计算机网络",
        title: `CDN：内容的"快递网络"`,
        analogy: `CDN就像在多个城市设有仓库的电商。当北京的用户买东西，电商不会从广州发货，而是从北京的仓库出库，大大加快速度。`,
        core: `CDN将内容缓存到离用户最近的边缘节点，减少延迟，提高访问速度。包含DNS解析、缓存策略、动态加速等技术。`,
        connection: `大数据和AI应用的用户体验保障。用户获取AI分析结果或大数据报表时，CDN确保快速加载。`,
        keywords: ["CDN", "边缘计算", "缓存", "加速", "内容分发"]
      },
      {
        id: 6,
        domain: "network",
        domainName: "计算机网络",
        title: `HTTP/HTTPS：网页的"快递单"`,
        analogy: `你去快递站寄东西，需要填写快递单写明寄什么、寄给谁。HTTP就是网页请求的"快递单"，HTTPS则是加密后的安全快递单。`,
        core: `HTTP是超文本传输协议，定义了客户端与服务器的通信格式。HTTPS在HTTP基础上加入SSL/TLS加密，保障数据传输安全。`,
        connection: `Web应用的基础协议。云计算的Web控制台、大数据平台的可视化界面都通过HTTPS提供安全的访问。`,
        keywords: ["HTTP", "HTTPS", "SSL", "TLS", "安全传输"]
      },
      {
        id: 7,
        domain: "network",
        domainName: "计算机网络",
        title: `防火墙：网络的"安检门"`,
        analogy: `就像写字楼的门禁系统，只有授权人员才能进入。防火墙监控进出网络的数据，只允许符合规则的流量通过。`,
        core: `防火墙通过规则匹配过滤网络流量，包括包过滤、状态检测、应用层防火墙等类型。是网络安全的第一道防线。`,
        connection: `云安全的基础组件。云服务商提供安全组/网络ACL，类似于虚拟防火墙，保护云服务器免受攻击。`,
        keywords: ["防火墙", "安全组", "网络ACL", "流量过滤", "访问控制"]
      },
      {
        id: 8,
        domain: "network",
        domainName: "计算机网络",
        title: `SD-WAN：智能的"网络交警"`,
        analogy: `城市道路有普通路也有高速路，遇到拥堵可以切换路线。SD-WAN就像智能交通系统，自动选择最优网络路径，保证业务不卡顿。`,
        core: `SD-WAN是软件定义广域网，通过软件集中管理网络，智能调度流量。支持多链路接入、MPLS与互联网混合组网。`,
        connection: `企业多分支组网的利器。在云计算时代，SD-WAN让企业各地分支都能高效安全地接入云端应用。`,
        keywords: ["SD-WAN", "广域网", "智能调度", "多链路", "网络优化"]
      },
      {
        id: 9,
        domain: "network",
        domainName: "计算机网络",
        title: `NAT网关：私网的"对外窗口"`,
        analogy: `就像公司前台总机，内部员工有不同的分机号，但对外只有一个总机号码。NAT让多个内部设备共享一个公网IP上网。`,
        core: `NAT网络地址转换，将内部私有IP地址映射为公网IP。解决IPv4地址不足的问题，同时隐藏内部网络结构。`,
        connection: `云VPC网络的标配。部署在云端的服务器通过NAT网关访问外部服务，同时保证内网安全。`,
        keywords: ["NAT", "网关", "地址转换", "公网IP", "私有网络"]
      },
      {
        id: 10,
        domain: "network",
        domainName: "计算机网络",
        title: `API网关：服务的"总前台"`,

        analogy: `培养一个世界冠军运动员需要最好的教练、训练设施和营养保障。AI大模型训练需要GPU集群提供强大算力、快速存储和稳定网络。`,
        core: `AI训练集群由数百到数千张GPU通过高速网络互联，配合分布式存储和容器调度，是训练大模型的必备基础设施。`,
        connection: `云计算的核心应用。GPU云服务器组成训练集群，是大语言模型、多模态模型训练的算力来源。`,
        keywords: ["GPU集群", "分布式训练", "NVLink", "RDMA", "算力"]
      },
      {
        id: 64,
        domain: "ai",
        domainName: "AI",
        title: `模型压缩：把大象装进冰箱`,
        analogy: `大模型像一头大象太强大了但太占地方，模型压缩技术把它缩小到能装进各种设备。压缩后的模型可以在手机、边缘设备上运行。`,
        core: `模型压缩包括：量化（减少参数位数）、剪枝（去除冗余连接）、蒸馏（用小模型学习大模型）。可在精度损失很小情况下大幅降低资源消耗。`,
        connection: `边缘AI的关键技术。压缩后的AI模型可以部署在边缘节点，实现低延迟、高隐私的本地推理。`,
        keywords: ["模型压缩", "量化", "剪枝", "蒸馏", "边缘AI"]
      },
      {
        id: 65,
        domain: "ai",
        domainName: "AI",
        title: `AI计算out-of-memory：内存的"爆仓"危机`,
        analogy: `就像同时打开几十个大型游戏电脑会死机，AI模型太大、训练数据太多时显存也会不够用。OOM是AI训练中的常见问题。`,
        core: `OOM（Out of Memory）发生在GPU显存不足时。解决方案：梯度累积、混合精度训练、ZeRO优化、模型并行等技术。`,
        connection: `大数据量AI训练的挑战。当处理TB级训练数据时，需要综合运用各种优化技术避免显存不足。`,
        keywords: ["OOM", "显存", "梯度累积", "混合精度", "ZeRO"]
      },
      {
        id: 66,
        domain: "ai",
        domainName: "AI",
        title: `AI幻觉：一本正经的"胡说八道"`,
        analogy: `就像一个自信的骗子说话头头是道但全是假的，AI有时会一本正经地编造听起来很合理但实际错误的答案。`,
        core: `AI幻觉指模型生成看似合理但实际错误或无意义的内容。原因包括：训练数据偏差、知识截止、推理错误等。缓解方法：RAG、事实核查。`,
        connection: `企业AI应用的重大风险。AI可能生成误导性的业务分析，需要结合知识库和人工审核来保证准确性。`,
        keywords: ["AI幻觉", "Hallucination", "事实核查", "RAG", "可信AI"]
      }
    ];

    const connectionTemplates = [
      [
        { domain: "network", title: "网络基础" },
        { domain: "cloud", title: "云计算平台" },
        { domain: "deployment", title: "容器部署" },
        { domain: "bigdata", title: "数据处理" },
        { domain: "ai", title: "智能应用" }
      ],
      [
        { domain: "ai", title: "AI训练" },
        { domain: "bigdata", title: "海量数据" },
        { domain: "cloud", title: "弹性算力" },
        { domain: "network", title: "高速网络" },
        { domain: "deployment", title: "自动部署" }
      ],
      [
        { domain: "network", title: "流量入口" },
        { domain: "cloud", title: "资源调度" },
        { domain: "bigdata", title: "实时分析" },
        { domain: "ai", title: "智能决策" },
        { domain: "deployment", title: "持续交付" }
      ]
    ];

    let currentFilter = 'all';
    let currentCards = [];

    function getTodayKey() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    }

    function getShownIds() {
      const today = getTodayKey();
      const stored = localStorage.getItem('techDaily_shown_' + today);
      return stored ? JSON.parse(stored) : [];
    }

    function saveShownIds(ids) {
      const today = getTodayKey();
      localStorage.setItem('techDaily_shown_' + today, JSON.stringify(ids));
    }

    function getUnshownCards() {
      const shownIds = getShownIds();
      return knowledgeBase.filter(k => !shownIds.includes(k.id));
    }

    function markAsShown(cardIds) {
      const shownIds = getShownIds();
      const newShownIds = [...new Set([...shownIds, ...cardIds])];
      saveShownIds(newShownIds);
    }

    function resetToday() {
      const today = getTodayKey();
      localStorage.removeItem('techDaily_shown_' + today);
    }

    function getRandomConnections() {
      return connectionTemplates[Math.floor(Math.random() * connectionTemplates.length)];
    }

    function getRandomCards() {
      let unshown = getUnshownCards();

      if (unshown.length < 5) {
        resetToday();
        unshown = knowledgeBase;
      }

      const shuffled = [...unshown].sort(() => Math.random() - 0.5);
      const selected = [];

      const domains = ['network', 'cloud', 'deployment', 'bigdata', 'ai'];
      const shuffledDomains = domains.sort(() => Math.random() - 0.5);

      shuffledDomains.forEach(domain => {
        const domainCards = shuffled.filter(k => k.domain === domain);
        if (domainCards.length > 0) {
          const randomCard = domainCards[Math.floor(Math.random() * domainCards.length)];
          selected.push(randomCard);
        }
      });

      const remaining = shuffled.filter(k => !selected.includes(k));
      const targetCount = Math.min(10, shuffled.length);

      while (selected.length < targetCount && remaining.length > 0) {
        const card = remaining.shift();
        if (!selected.includes(card)) {
          selected.push(card);
        }
      }

      markAsShown(selected.map(c => c.id));

      return selected.sort(() => Math.random() - 0.5);
    }

    function formatDate() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      const weekday = weekdays[now.getDay()];
      return `${year}年${month}月${day}日 ${weekday}`;
    }

    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';

      const filteredCards = currentFilter === 'all'
        ? currentCards
        : currentCards.filter(card => card.domain === currentFilter);

      filteredCards.forEach((card, index) => {
        const cardEl = document.createElement('div');
        cardEl.className = 'card';
        cardEl.dataset.domain = card.domain;
        cardEl.onclick = () => openModal(card);
        cardEl.style.transitionDelay = `${index * 100}ms`;

        cardEl.innerHTML = `
          <div class="card-header">
            <span class="domain-badge">${card.domainName}</span>
            <span class="card-number">#${card.id}</span>
          </div>
          <h3>${card.title}</h3>
          <p class="card-analogy">${card.analogy}</p>
          <div class="card-keywords">
            ${card.keywords.map(k => `<span class="keyword">${k}</span>`).join('')}
          </div>
          <div class="expand-hint">
            <span>点击查看详情</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </div>
        `;

        grid.appendChild(cardEl);

        setTimeout(() => {
          cardEl.classList.add('visible');
        }, 50);
      });
    }

    function renderConnectionChain() {
      const chain = document.getElementById('connectionChain');
      const connections = getRandomConnections();

      chain.innerHTML = connections.map((item, index) => `
        <span class="chain-item" data-domain="${item.domain}">${item.title}</span>
        ${index < connections.length - 1 ? '<span class="chain-arrow">→</span>' : ''}
      `).join('');
    }

    function filterDomain(domain) {
      currentFilter = domain;

      document.querySelectorAll('.domain-tag').forEach(tag => {
        tag.classList.toggle('active', tag.dataset.domain === domain);
      });

      renderCards();
    }

    function openModal(card) {
      const modal = document.getElementById('modal');
      const overlay = document.getElementById('modalOverlay');

      modal.style.setProperty('--modal-accent', `var(--accent-${card.domain})`);

      modal.innerHTML = `
        <div class="modal-header">
          <h3>${card.title}</h3>
          <button class="modal-close" onclick="closeModal()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-section">
            <h4>通俗理解</h4>
            <p>${card.analogy}</p>
          </div>
          <div class="modal-section">
            <h4>核心技术点</h4>
            <p>${card.core}</p>
          </div>
          <div class="modal-section">
            <h4>与其他领域的联系</h4>
            <p>${card.connection}</p>
          </div>
          <div class="modal-section">
            <h4>关键词</h4>
            <div class="card-keywords">
              ${card.keywords.map(k => `<span class="keyword">${k}</span>`).join('')}
            </div>
          </div>
        </div>
      `;

      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(event) {
      if (event && event.target !== event.currentTarget) return;
      const overlay = document.getElementById('modalOverlay');
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    let refreshCount = 0;
    let refreshTimer = null;

    function refreshCards() {
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => {
        card.classList.remove('visible');
      });

      setTimeout(() => {
        currentCards = getRandomCards();
        renderCards();
        renderConnectionChain();

        const remaining = getUnshownCards().length;
        if (remaining > 0) {
          document.getElementById('remainingCount').textContent = `今日剩余: ${remaining} 条`;
        } else {
          document.getElementById('remainingCount').textContent = '今日已阅尽，明天再见';
        }
      }, 300);

      refreshCount++;
      if (refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        refreshCount = 0;
      }, 2000);

      if (refreshCount >= 3) {
        resetToday();
        refreshCount = 0;
        setTimeout(() => {
          currentCards = getRandomCards();
          renderCards();
          renderConnectionChain();
          document.getElementById('remainingCount').textContent = `已重置！今日剩余: ${getUnshownCards().length} 条`;
        }, 300);
      }
    }

    document.getElementById('dateDisplay').textContent = formatDate();
    currentCards = getRandomCards();
    renderCards();
    renderConnectionChain();
    document.getElementById('remainingCount').textContent = `今日剩余: ${getUnshownCards().length} 条`;

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
